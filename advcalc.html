<!-- index.html --><!DOCTYPE html><html lang="en" class="h-full">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Glucose & Insulin Manager</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb"></head><body class="bg-gray-100 dark:bg-gray-900 min-h-screen p-4"><div class="max-w-xl mx-auto space-y-4"><h1 class="text-2xl font-bold text-center text-gray-800 dark:text-white">
Glucose & Insulin Manager
</h1><!-- INPUT CARD --><div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow"><div class="grid grid-cols-2 gap-3">
<input id="bg" type="number" placeholder="Current BG" class="p-2 border rounded">
<input id="target" type="number" placeholder="Target BG" value="100" class="p-2 border rounded">
<input id="carbs" type="number" placeholder="Carbs (g)" class="p-2 border rounded">
<input id="ratio" type="number" placeholder="Carb Ratio" value="10" class="p-2 border rounded">
<input id="cf" type="number" placeholder="Correction Factor" value="50" class="p-2 border rounded col-span-2">
</div><button onclick="calculate()" class="w-full mt-3 bg-blue-600 text-white py-2 rounded">
Calculate Dose
</button><div class="mt-3 text-center text-green-600 font-bold" id="dose"></div></div><!-- CHART --><div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow">
<canvas id="chart"></canvas>
</div><!-- HISTORY --><div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow">
<h2 class="font-bold mb-2 text-gray-700 dark:text-gray-200">History</h2>
<ul id="history" class="text-sm space-y-1"></ul>
</div></div><script>

let chart;

function calculate(){

let bg = +document.getElementById("bg").value;
let target = +document.getElementById("target").value;
let carbs = +document.getElementById("carbs").value;
let ratio = +document.getElementById("ratio").value;
let cf = +document.getElementById("cf").value;

if(!bg || !carbs || !ratio || !cf){return;}

let carbDose = carbs / ratio;
let correction = (bg - target) / cf;
if(correction < 0) correction = 0;

let total = (carbDose + correction).toFixed(1);

document.getElementById("dose").innerText = total + " units";

saveEntry(bg, total);
updateChart();
renderHistory();

}

function saveEntry(bg, dose){

let data = JSON.parse(localStorage.getItem("entries") || "[]");

data.push({
  bg,
  dose,
  time: new Date().toLocaleTimeString()
});

localStorage.setItem("entries", JSON.stringify(data));

}

function renderHistory(){

let list = document.getElementById("history");
let data = JSON.parse(localStorage.getItem("entries") || "[]");

list.innerHTML = data.slice(-5).reverse().map(e =>
`<li>${e.time} - BG: ${e.bg}, Dose: ${e.dose}</li>`
).join("");

}

function updateChart(){

let data = JSON.parse(localStorage.getItem("entries") || "[]");

let labels = data.map(e => e.time);
let values = data.map(e => e.bg);

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"), {
  type: 'line',
  data: {
    labels,
    datasets: [{ data: values }]
  }
});

}

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

renderHistory();
updateChart();

</script></body>
</html><!-- manifest.json -->{ "name": "Glucose Manager", "short_name": "GlucoseApp", "start_url": ".", "display": "standalone", "background_color": "#ffffff", "theme_color": "#
